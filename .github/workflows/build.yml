name: Build & Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      skip_tests:
        description: Skip test step
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '22'
  ARTIFACT_DIR: release

jobs:
  # ── Stage 1: Type check ───────────────────────────────────────────────────────
  typecheck:
    name: TypeScript check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check (root + main + preload)
        run: pnpm typecheck

  # ── Stage 2: Build ────────────────────────────────────────────────────────────
  build:
    name: Build Windows .exe
    runs-on: windows-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Set env vars for the build
      - name: Set build env
        shell: bash
        run: |
          echo "BUILD_NUMBER=$(date +%Y%m%d%H%M%S)" >> $GITHUB_ENV
          echo "VERSION_TAG=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build Electron app
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: pnpm electron:build

      # Show what was produced
      - name: List release artifacts
        shell: bash
        run: ls -la release/

      # Upload artifacts (kept 90 days)
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: hyperclip-setup
          path: release/HyperClip-Setup-*.exe
          retention-days: 90

      - name: Upload portable zip
        uses: actions/upload-artifact@v4
        with:
          name: hyperclip-portable
          path: release/HyperClip-portable-*.zip
          retention-days: 1

  # ── Stage 3: Upload to CDN ─────────────────────────────────────────────────────
  upload-cdn:
    name: Upload to CDN
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4

      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: hyperclip-setup
          path: artifacts/

      - name: List downloaded files
        run: ls -la artifacts/

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "RELEASE_VERSION=$VERSION" >> $GITHUB_ENV
          echo "IS_RELEASE=true" >> $GITHUB_ENV

      - name: Set version from commit (main branch)
        if: github.ref == 'refs/heads/main'
        run: |
          COMMIT_HASH="${GITHUB_SHA:0:8}"
          echo "RELEASE_VERSION=build-${COMMIT_HASH}" >> $GITHUB_ENV
          echo "IS_RELEASE=false" >> $GITHUB_ENV

      - name: Upload to CDN
        env:
          CDN_HOST: ${{ secrets.CDN_HOST }}
          CDN_USER: ${{ secrets.CDN_USER }}
          CDN_KEY: ${{ secrets.CDN_KEY }}
          CDN_PATH: ${{ secrets.CDN_PATH }}
        run: |
          # Use rsync or scp to upload to CDN
          # The CDN server should be configured with a web server serving the updates/ directory
          echo "Uploading to CDN: ${CDN_HOST}"
          # Example using rsync (uncomment and configure secrets):
          # rsync -avz --delete \
          #   -e "ssh -i ${{ secrets.CDN_KEY }}" \
          #   artifacts/ \
          #   ${CDN_USER}@${CDN_HOST}:${CDN_PATH}/updates/${RELEASE_VERSION}/
          echo "CDN upload skipped (configure CDN_* secrets and uncomment rsync above)"
          echo "VERSION=${RELEASE_VERSION}" >> $GITHUB_ENV

      - name: Generate and upload manifest
        run: |
          # Create manifest.json
          ARTIFACT=$(ls artifacts/*.exe | head -1)
          SHA256=$(sha256sum "$ARTIFACT" | awk '{print $1}')
          SIZE=$(stat -c%s "$ARTIFACT")

          mkdir -p manifests
          cat > manifests/manifest.json << EOF
          {
            "version": "${RELEASE_VERSION}",
            "releaseDate": "$(date -Iseconds)",
            "releaseNotes": "https://github.com/${{ github.repository }}/releases/tag/v${RELEASE_VERSION}",
            "files": [
              {
                "url": "HyperClip-Setup-${RELEASE_VERSION}.exe",
                "sha256": "${SHA256}",
                "size": ${SIZE}
              }
            ],
            "path": "HyperClip-Setup-${RELEASE_VERSION}.exe",
            "sha256": "${SHA256}"
          }
          EOF

          echo "Manifest created:"
          cat manifests/manifest.json

          # Upload manifest
          # rsync -avz manifests/ ${CDN_USER}@${CDN_HOST}:${CDN_PATH}/updates/
          echo "Manifest upload skipped (uncomment rsync above)"

  # ── Stage 4: GitHub Release ─────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, upload-cdn]
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: hyperclip-setup
          path: artifacts/

      - name: Download portable artifact
        uses: actions/download-artifact@v4
        with:
          name: hyperclip-portable
          path: artifacts/

      - name: Create Release + Upload Assets via GitHub CLI
        run: |
          # Find the actual files
          SETUP_FILE=$(ls artifacts/*.exe 2>/dev/null | head -1)
          PORTABLE_FILE=$(ls artifacts/*.zip 2>/dev/null | head -1)
          echo "Setup: $SETUP_FILE"
          echo "Portable: $PORTABLE_FILE"

          # Get the tag name without 'v' prefix
          TAG="${GITHUB_REF_NAME#v}"
          echo "Tag: $TAG"

          # Create a draft release, then upload assets
          # Use GitHub CLI to create release
          gh release create "v${TAG}" \
            --title "HyperClip v${TAG}" \
            --notes "See https://github.com/${{ github.repository }}/releases" \
            --draft \
            --prerelease=${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}

          # Upload assets
          if [ -n "$SETUP_FILE" ]; then
            gh release upload "v${TAG}" "$SETUP_FILE" --clobber
          fi
          if [ -n "$PORTABLE_FILE" ]; then
            gh release upload "v${TAG}" "$PORTABLE_FILE" --clobber
          fi
