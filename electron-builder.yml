appId: com.loopcompany.hyperclip
productName: HyperClip
directories:
  output: release
  buildResources: resources
files:
  - .next/**/*
  - dist-electron/**/*
  - package.json
extraResources:
  - from: resources/
    to: resources/
  - from: resources/ffmpeg/
    to: ffmpeg/
asarUnpack:
  # sql.js WASM binary must be outside asar archive for Node.js fs access
  - node_modules/sql.js/dist/sql-wasm.wasm
  # FFmpeg must be outside asar for spawn() access
  - ffmpeg/**
win:
  target:
    - target: portable
      arch:
        - x64
  icon: resources/icon.ico
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
asar: true