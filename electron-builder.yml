appId: com.loopcompany.hyperclip
productName: HyperClip
copyright: Copyright © 2026 HyperClip
directories:
  output: release
  buildResources: build
files:
  - dist-electron/**/*
  - src/**/*
  - next.config.mjs
  - package.json
  - .next/**/*
extraResources:
  - from: resources/ffmpeg/bin/
    to: ffmpeg/bin/
  - from: resources/yt-dlp/
    to: yt-dlp/
  - from: resources/node/
    to: node/
    filter:
      - "**/*"
  - from: resources/fonts/
    to: fonts/
  - from: build/icon.ico
    to: build/icon.ico
asarUnpack: []

# Auto-update configuration (disabled — manual update only)
# publish:
#   provider: generic
#   url: https://cdn.hyperclip.io/updates/
#   channel: latest
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: dir
      arch:
        - x64
  icon: build/icon.ico
  artifactName: "${productName}-Setup-${version}.${ext}"
  signAndEditExecutable: false

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: HyperClip
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  include: installer.nsh
  perMachine: false
  deleteAppDataOnUninstall: false
  runAfterFinish: true
  installerHeaderIcon: build/icon.ico
  displayLanguageSelector: false

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: dir
      arch:
        - x64
  category: Video
  icon: build/icon.png
  artifactName: "${productName}-${version}.${ext}"

mac:
  target:
    - target: dir
      arch:
        - x64
  category: public.app-category.video
  icon: build/icon.icns
  artifactName: "${productName}-${version}.${ext}"

asar: false
compression: maximum

