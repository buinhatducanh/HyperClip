appId: com.loopcompany.hyperclip
productName: HyperClip
copyright: Copyright © 2026 HyperClip
directories:
  output: release
  buildResources: build
files:
  - dist-electron/**/*
  - package.json
extraResources:
  - from: resources/
    to: resources/
    filter:
      - "**/*"
  - from: resources/ffmpeg/bin/
    to: ffmpeg/bin/
  - from: resources/yt-dlp/
    to: yt-dlp/
asarUnpack:
  # sql.js WASM binary must be outside asar archive for Node.js fs access
  - node_modules/sql.js/dist/sql-wasm.wasm
  # FFmpeg must be outside asar for spawn() access
  - ffmpeg/**
  # Unpack next module so Next.js CLI can read files and resolve deps
  - node_modules/next/**/*
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  artifactName: "${productName}-Setup-${version}.${ext}"
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: HyperClip
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  include: installer.nsh
  perMachine: false
  deleteAppDataOnUninstall: false
  runAfterFinish: true
  createUploadArchive: false
asar: true
compression: maximum
